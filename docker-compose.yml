services:
  app:
    build:
      context: .
    ports:
      - '3000:3000'
    environment:
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
      - NODE_ENV=development
    command: npm run start:dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app_network
    depends_on:
      - db

  db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "5434:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql
    networks:
      - app_network

volumes:
  pgdata:

networks:
  app_network: